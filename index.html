<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Rock Paper Scissors</h1>

        <div class="mode">
            <button onclick="setMode('computer')">🤖 Computer</button>
            <button onclick="setMode('player')">👥 2 Player</button>
        </div>

        <div class="buttons">
            <button onclick="play('Rock')">🪨</button>
            <button onclick="play('Paper')">📄</button>
            <button onclick="play('Scissors')">✂️</button>
        </div>

        <div id="choice">
            Choose a mode to start
        </div>

        <div id="status"></div>

        <div class="score">
            Player 1 :
            <span id="p1">0</span>

            <span> | </span>

            <span id="label">Computer</span> :
            
            <span id="p2">0</span>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
